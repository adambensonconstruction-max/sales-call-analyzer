services:
  - type: web
    name: sales-call-analyzer-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sales-call-analyzer.netlify.app
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health
