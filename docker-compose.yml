# ============================================================================
# Sales Call Analyzer — Docker Compose Configuration
# ============================================================================
# This compose file sets up the full stack for local development:
# - PostgreSQL (optional, for local dev without Supabase)
# - Backend Flask API
# - Frontend React app
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up -d backend  # Start only backend
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop all services
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL (Optional - for local development without Supabase)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: sca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salescall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-salescall_analyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salescall} -d ${POSTGRES_DB:-salescall_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sca-network

  # ==========================================================================
  # Redis (Optional - for rate limiting and caching)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: sca-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sca-network

  # ==========================================================================
  # Backend API (Flask)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BACKEND_BUILD_TARGET:-production}
    container_name: sca-backend
    restart: unless-stopped
    environment:
      # Flask
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-in-production}
      
      # Supabase (Required)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      
      # OpenAI (Required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # AssemblyAI (Required for transcription)
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      
      # Deepgram (Optional - for live transcription)
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      
      # Redis (optional)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      
      # Sentry (optional)
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Mount for development hot-reload (comment out in production)
      - ./backend:/app:ro
      - backend_uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sca-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Frontend (React + Vite)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time environment variables
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: sca-frontend
    restart: unless-stopped
    environment:
      # Runtime environment (for nginx config)
      NGINX_BACKEND_HOST: backend
      NGINX_BACKEND_PORT: 5000
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      # SSL certificates (mount your own in production)
      - ./ssl:/etc/nginx/ssl:ro
      # Nginx config override
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sca-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==========================================================================
  # Celery Worker (Optional - for async task processing)
  # ==========================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sca-worker
    restart: unless-stopped
    environment:
      # Same as backend
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      
      # Worker-specific
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - sca-network
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

# ============================================================================
# Networks
# ============================================================================
networks:
  sca-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
